{% extends "base.html" %}
{% block title %}Register | {% endblock %}
{% block content %}
   <div style="max-width:460px;margin-inline:auto;">
    <span class="eyebrow">Join the crew</span>
    <h1 style="margin-bottom:var(--space-4);">Create your account</h1>

    <form method="POST" class="surface" style="padding:var(--space-6);">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary mt-2" style="width:100%;" type="submit">Sign Up</button>
    </form>
    <div class="text-center mt-3">
        <span style="font-size:var(--text-xs);color:var(--trail-muted);">
            Already have an account? <a href="{% url 'login' %}">Sign In</a>
        </span>
    </div>
   </div>
{% endblock content %}
